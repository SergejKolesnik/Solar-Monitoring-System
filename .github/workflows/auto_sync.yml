name: SkyGrid Auto Sync

on:
  schedule:
    # Запуск кожні 3 години (у 0, 3, 6, 9, 12, 15, 18, 21 годину за UTC)
    - cron: '0 */3 * * *'
  workflow_dispatch: # Залишаємо кнопку ручного запуску

jobs:
  update: # Змінив назву джоби на ту, що у вас була
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install pandas requests pytz openpyxl scikit-learn

      - name: Run Collector
        env:
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: python collector.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'SkyGrid Bot'
          git config --global user.email 'bot@skygrid.ai'
          git add solar_ai_base.csv
          # Додаємо pull, щоб уникнути конфліктів
          git pull origin main --rebase
          git commit -m "Auto-update: Sync Forecast and Fact" || exit 0
          # Вказуємо конкретний шлях для push
          git push origin main
