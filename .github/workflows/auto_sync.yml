name: SkyGrid Auto Sync

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install pandas requests openpyxl scikit-learn

      - name: Run Collector
        env:
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: python collector.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'SkyGrid Bot'
          git config --global user.email 'bot@skygrid.ai'
          
          # Оновлюємо посилання
          git fetch origin main
          
          # ПРИМУСОВО додаємо файл, навіть якщо Git пручається
          git add -f solar_ai_base.csv
          
          # Перевіряємо, чи файл тепер у черзі (staging)
          git status
          
          # Робимо коміт
          git commit -m "Auto-update solar base: $(date +'%Y-%m-%d %H:%M')" || echo "No changes to commit"
          
          # ПРИМУСОВИЙ ПУШ, щоб перебити будь-які конфлікти
          git push origin main --force
