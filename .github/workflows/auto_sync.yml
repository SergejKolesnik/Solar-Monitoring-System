name: auto_sync

on:
  schedule:
    - cron: '0 * * * *' # Запуск щогодини
  workflow_dispatch: # Дозволяє запускати вручну кнопкою

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # Оновлено до v4

      - name: Set up Python
        uses: setup-python@v5 # Оновлено до v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas openpyxl PyGithub requests

      - name: Run collector
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python collector.py
