name: SkyGrid Auto Sync

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install pandas requests openpyxl scikit-learn

      - name: Run Collector
        env:
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: python collector.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'SkyGrid Bot'
          git config --global user.email 'bot@skygrid.ai'
          
          # Отримуємо останні зміни з сервера (якщо були) без скидання локальних файлів
          git pull origin main --rebase
          
          # Додаємо саме наш файл бази
          git add solar_ai_base.csv
          
          # Створюємо коміт, якщо є реальні зміни в даних
          git commit -m "Auto-update solar base: $(date +'%Y-%m-%d %H:%M')" || echo "No changes to commit"
          
          # Відправляємо оновлений файл на GitHub
          git push origin main
