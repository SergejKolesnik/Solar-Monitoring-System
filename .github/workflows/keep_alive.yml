name: Keep Site Awake

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Streamlit
        run: |
          curl -s -o /dev/null -w "%{http_code}" --max-redirs 5 https://pd2b4edrjntm8tyeulappbo.streamlit.app/ || true
